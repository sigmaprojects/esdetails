services:
  esdetails:
    container_name: esdetails
    # REMOVE THE BUILD LINE WHEN USING A PRE-BUILT IMAGE FROM DOCKER HUB
    build: .
    image: sigmaprojects/esdetails:latest
    ports:
      - "3253:3253"
    volumes:
      - esdetails-data:/data
    environment:
      - NODE_ENV=production
      - PORT=3253
      - DATA_DIR=/data
      - TZ=${TZ:-America/Los_Angeles}
      # Default Ollama URL — points to the Docker host so the container can reach
      # an Ollama instance running on the host machine.
      # Change to a real hostname/IP if Ollama runs elsewhere.
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llava}
      - LISTING_CACHE_HOURS=${LISTING_CACHE_HOURS:-20}
      - IMAGE_CACHE_DAYS=${IMAGE_CACHE_DAYS:-14}
    extra_hosts:
      # Allows "host.docker.internal" to resolve to the host on Linux
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3253/', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  esdetails-data:
