<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Estate Sale Finder</title>
<style>
  :root {
    --bg: #f5f0eb; --surface: #ffffff; --border: #e2ddd7; --text: #3d3529;
    --muted: #8c8275; --accent: #c2703e; --accent2: #b5622f; --accent-soft: #f8efe8;
    --green: #5a9a62; --green-soft: #eaf5ec; --red: #c95b5b; --red-soft: #fceaea;
    --radius: 12px; --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5; }

  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; box-shadow: var(--shadow); }
  header h1 { font-size: 1.4rem; font-weight: 700; white-space: nowrap; color: var(--accent2); letter-spacing: -0.01em; }
  .header-actions { margin-left: auto; display: flex; gap: 8px; }

  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin: 16px 20px; padding: 20px; box-shadow: var(--shadow); }
  .panel h2 { font-size: 1rem; font-weight: 600; margin-bottom: 12px; color: var(--text); }
  .panel summary { cursor: pointer; font-weight: 600; font-size: 1rem; color: var(--muted); padding: 4px 0; }
  .panel summary:hover { color: var(--text); }

  .zip-chips { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .zip-chip { background: var(--accent-soft); border-radius: 20px; padding: 4px 12px; font-size: 0.85rem; display: flex; align-items: center; gap: 6px; color: var(--accent2); }
  .zip-chip button { background: none; border: none; color: var(--red); cursor: pointer; font-size: 1rem; line-height: 1; padding: 0; }
  .zip-add { display: flex; gap: 4px; }
  .zip-add input { width: 70px; padding: 6px 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 0.85rem; }
  .zip-add input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .zip-add button { padding: 6px 14px; }
  .zip-table { width: 100%; border-collapse: collapse; }
  .zip-table th, .zip-table td { text-align: left; padding: 8px 10px; font-size: 0.85rem; }
  .zip-table th { color: var(--muted); font-weight: 500; border-bottom: 2px solid var(--border); font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.03em; }
  .zip-table td { border-bottom: 1px solid var(--border); }
  .zip-table tr:last-child td { border-bottom: none; }
  .zip-table input[type="text"] { width: 80px; padding: 5px 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.85rem; text-align: center; }
  .zip-table input[type="text"]:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .zip-table input[type="range"] { width: 100px; vertical-align: middle; accent-color: var(--accent); }
  .zip-table .dist-val { display: inline-block; width: 35px; text-align: right; font-size: 0.8rem; color: var(--muted); }

  .filter-bar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin: 16px 20px; background: var(--surface); padding: 14px 18px; border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); }
  .filter-bar label { font-size: 0.82rem; color: var(--muted); font-weight: 500; }
  .filter-bar input[type="date"] { padding: 6px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.85rem; }
  .filter-bar input[type="date"]:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .filter-bar input[type="text"] { padding: 6px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.85rem; flex: 1; min-width: 150px; }
  .filter-bar input[type="text"]:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .filter-bar input[type="number"] { padding: 6px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.85rem; -moz-appearance: textfield; }
  .filter-bar input[type="number"]:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .filter-bar input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

  button, .btn { padding: 8px 16px; border: none; border-radius: 8px; background: var(--accent); color: #fff; cursor: pointer; font-size: 0.85rem; font-weight: 500; transition: all 0.15s ease; }
  button:hover { background: var(--accent2); transform: translateY(-1px); box-shadow: var(--shadow); }
  button:active { transform: translateY(0); }
  button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-sm { padding: 5px 12px; font-size: 0.8rem; border-radius: 6px; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--muted); font-weight: 500; }
  .btn-outline:hover { background: var(--bg); border-color: var(--accent); color: var(--accent); transform: none; box-shadow: none; }

  .settings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
  .settings-grid label { font-size: 0.8rem; color: var(--muted); display: block; font-weight: 500; }
  .settings-grid input, .settings-grid select, .settings-grid textarea { width: 100%; padding: 7px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.85rem; margin-top: 4px; }
  .settings-grid input:focus, .settings-grid select:focus, .settings-grid textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .settings-grid textarea { height: 60px; resize: vertical; font-family: monospace; }
  .settings-grid .full-width { grid-column: 1 / -1; }

  #progress-log { font-size: 0.82rem; color: var(--muted); max-height: 300px; overflow-y: auto; margin-top: 10px; border-top: 1px solid var(--border); padding-top: 8px; }
  #progress-log p { margin: 3px 0; padding: 2px 6px; border-radius: 4px; }

  .listings-container { padding: 0 20px 30px; }
  .listing-count { font-size: 0.85rem; color: var(--muted); margin-bottom: 10px; font-weight: 500; }

  .listing-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; box-shadow: var(--shadow); transition: box-shadow 0.15s ease; }
  .listing-card:hover { box-shadow: var(--shadow-md); }
  .listing-col-headers { display: grid; grid-template-columns: 2fr 1fr 1.5fr auto auto; gap: 10px; padding: 8px 16px; font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; border-bottom: 2px solid var(--border); margin-bottom: 6px; }
  .col-sort { cursor: pointer; user-select: none; display: flex; align-items: center; gap: 4px; transition: color 0.1s; }
  .col-sort:hover { color: var(--accent); }
  .sort-arrow { font-size: 0.7rem; }
  .listing-header { padding: 12px 16px; cursor: pointer; display: grid; grid-template-columns: 2fr 1fr 1.5fr auto auto; gap: 10px; align-items: center; transition: background 0.1s; }
  .listing-header:hover { background: var(--accent-soft); }
  .listing-title { font-weight: 600; font-size: 0.95rem; color: var(--text); }
  .listing-meta { font-size: 0.82rem; color: var(--muted); }
  .listing-badges { display: flex; gap: 6px; }
  .badge { font-size: 0.75rem; padding: 3px 10px; border-radius: 20px; background: var(--bg); color: var(--muted); font-weight: 500; }
  .badge-img { background: var(--accent-soft); color: var(--accent2); }

  .listing-body { display: none; padding: 0 16px 16px; border-top: 1px solid var(--border); }
  .listing-body.open { display: block; padding-top: 14px; }
  .listing-address { font-size: 0.85rem; margin-bottom: 8px; }
  .listing-address a { color: var(--accent); text-decoration: none; font-weight: 500; }
  .listing-address a:hover { text-decoration: underline; }
  .listing-actions { margin-bottom: 12px; display: flex; gap: 8px; justify-content: flex-end; }
  .listing-actions .show-all-btn { margin-right: auto; background: var(--accent-soft); color: var(--accent); border: 1px solid var(--accent); font-size: 0.78rem; cursor: pointer; padding: 4px 10px; border-radius: var(--radius); }
  .listing-actions .show-all-btn:hover { background: var(--accent); color: #fff; }

  .image-card.filtered-out { display: none; }
  .image-grid.show-all .image-card.filtered-out { display: block; }
  .image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
  .image-card { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; transition: transform 0.15s ease, box-shadow 0.15s ease; }
  .image-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
  .image-card img { width: 100%; aspect-ratio: 4/3; object-fit: cover; cursor: pointer; display: block; }
  .image-card .analysis { padding: 8px 10px; font-size: 0.78rem; color: var(--muted); max-height: 80px; overflow-y: auto; white-space: pre-wrap; line-height: 1.4; }
  .image-card .pending { padding: 8px 10px; font-size: 0.78rem; color: var(--accent); font-style: italic; }
  .image-card.match { border: 2px solid var(--accent); box-shadow: 0 0 12px rgba(194,112,62,0.2); }
  mark.highlight { background: #fce4b8; color: var(--text); border-radius: 2px; padding: 0 3px; }

  .image-card { position: relative; }
  .image-info { position: absolute; top: 6px; right: 6px; width: 20px; height: 20px; border-radius: 50%; background: rgba(0,0,0,0.55); color: #fff; font-size: 12px; font-weight: 700; font-style: italic; font-family: Georgia, serif; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 2; line-height: 1; }
  .image-info:hover { background: rgba(0,0,0,0.8); }
  .info-modal-body { background: var(--surface); border-radius: var(--radius); padding: 24px; max-width: 600px; width: 90vw; position: relative; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
  .info-modal-body h3 { margin-bottom: 14px; font-size: 1rem; color: var(--text); }
  .info-modal-body .info-row { margin-bottom: 10px; font-size: 0.85rem; line-height: 1.5; }
  .info-modal-body .info-row b { color: var(--muted); font-weight: 600; display: inline-block; min-width: 70px; }
  .info-modal-body .info-prompt { white-space: pre-wrap; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 0.82rem; max-height: 200px; overflow-y: auto; margin-top: 4px; font-family: monospace; line-height: 1.5; }

  .btn-hide { position: absolute; top: 8px; right: 8px; background: var(--bg); border: 1px solid var(--border); color: var(--muted); font-size: 0.75rem; padding: 4px 10px; border-radius: 6px; cursor: pointer; z-index: 3; }
  .btn-hide:hover { background: var(--red-soft); color: var(--red); border-color: var(--red); }
  .hidden-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin: 16px 20px 30px; padding: 0; box-shadow: var(--shadow); }
  .hidden-panel summary { cursor: pointer; font-weight: 500; font-size: 0.85rem; color: var(--muted); padding: 14px 18px; }
  .hidden-panel summary:hover { color: var(--text); }
  .hidden-list { padding: 0 18px 14px; display: flex; flex-wrap: wrap; gap: 6px; }
  .hidden-chip { background: var(--bg); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 0.82rem; display: flex; align-items: center; gap: 6px; color: var(--text); cursor: pointer; transition: all 0.1s; }
  .hidden-chip:hover { background: var(--green-soft); border-color: var(--green); color: var(--green); }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal-content { max-width: 90vw; max-height: 90vh; position: relative; display: flex; flex-direction: column; align-items: center; overflow: hidden; border-radius: var(--radius); box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
  .modal-content img { max-width: 90vw; max-height: 70vh; object-fit: contain; border-radius: var(--radius) var(--radius) 0 0; }
  .modal-nav { position: absolute; top: 0; width: 15%; height: calc(100% - 3em); cursor: pointer; z-index: 2; }
  .modal-nav-left { left: 0; }
  .modal-nav-right { right: 0; }
  .modal-close { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.5); border: none; color: #fff; font-size: 1.2rem; cursor: pointer; z-index: 1; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
  .modal-close:hover { background: rgba(0,0,0,0.7); transform: none; }
  .modal-analysis { width: 100%; background: var(--surface); padding: 14px 18px; font-size: 0.85rem; color: var(--text); max-height: 20vh; overflow-y: auto; white-space: pre-wrap; border-radius: 0 0 var(--radius) var(--radius); line-height: 1.6; }
</style>
</head>
<body>

<header>
  <h1>Estate Sale Finder</h1>
</header>

<!-- Filter bar -->
<div class="filter-bar">
  <label>From:</label><input type="date" id="filterFrom" />
  <label>To:</label><input type="date" id="filterTo" />
  <button class="btn-outline btn-sm" onclick="resetDates()">Reset</button>
  <input type="text" id="filterText" placeholder="Search for items, furniture, etc…" />
  <input type="number" id="filterZip" placeholder="Near zip" maxlength="5" style="width:90px" />
</div>

<!-- Listings -->
<div class="listings-container">
  <div class="listing-count" id="listingCount"></div>
  <div class="listing-col-headers">
    <span class="col-sort" data-col="title" onclick="toggleSort('title')">Title <span class="sort-arrow" id="sort-title"></span></span>
    <span class="col-sort" data-col="dates" onclick="toggleSort('dates')">Dates <span class="sort-arrow" id="sort-dates"></span></span>
    <span class="col-sort" data-col="address" onclick="toggleSort('address')">Address <span class="sort-arrow" id="sort-address"></span></span>
    <span></span>
    <span></span>
  </div>
  <div id="listingsArea"></div>
</div>

<!-- Hidden listings -->
<div class="hidden-panel" id="hiddenPanel" style="display:none">
  <details>
    <summary id="hiddenSummary">Hidden Listings (0)</summary>
    <div class="hidden-list" id="hiddenList"></div>
  </details>
</div>

<!-- Image modal -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div class="modal-nav modal-nav-left" onclick="modalNav(-1)"></div>
    <div class="modal-nav modal-nav-right" onclick="modalNav(1)"></div>
    <img id="modalImg" />
    <div class="modal-analysis" id="modalAnalysis"></div>
  </div>
</div>

<!-- Info modal -->
<div class="modal-overlay" id="infoModal" onclick="if(event.target===this)closeInfoModal()">
  <div class="info-modal-body">
    <button class="modal-close" onclick="closeInfoModal()">&times;</button>
    <h3>Analysis Details</h3>
    <div id="infoModalContent"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
