<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Estate Sale Scanner</title>
<style>
  :root { --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a; --text: #e4e6eb; --muted: #8b8fa3; --accent: #6c9bff; --accent2: #4a7aff; --green: #4caf50; --red: #e57373; --radius: 8px; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  header h1 { font-size: 1.3rem; font-weight: 600; white-space: nowrap; }
  .scan-indicator { font-size: 0.85rem; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .scan-indicator .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
  .scan-indicator .dot.running { background: var(--accent); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .header-actions { margin-left: auto; display: flex; gap: 8px; }

  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin: 12px 16px; padding: 16px; }
  .panel h2 { font-size: 1rem; font-weight: 600; margin-bottom: 10px; }
  .panel summary { cursor: pointer; font-weight: 600; font-size: 1rem; }

  .zip-chips { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .zip-chip { background: var(--border); border-radius: 20px; padding: 4px 10px; font-size: 0.85rem; display: flex; align-items: center; gap: 6px; }
  .zip-chip button { background: none; border: none; color: var(--red); cursor: pointer; font-size: 1rem; line-height: 1; padding: 0; }
  .zip-add { display: flex; gap: 4px; }
  .zip-add input { width: 70px; padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 0.85rem; }
  .zip-add button { padding: 4px 10px; }
  .zip-table { width: 100%; border-collapse: collapse; }
  .zip-table th, .zip-table td { text-align: left; padding: 4px 8px; font-size: 0.85rem; }
  .zip-table th { color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--border); }
  .zip-table td { border-bottom: 1px solid rgba(255,255,255,0.04); }
  .zip-table input[type="text"] { width: 70px; padding: 3px 6px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 0.85rem; text-align: center; }
  .zip-table input[type="range"] { width: 100px; vertical-align: middle; }
  .zip-table .dist-val { display: inline-block; width: 35px; text-align: right; font-size: 0.8rem; color: var(--muted); }

  .filter-bar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin: 12px 16px; }
  .filter-bar label { font-size: 0.85rem; color: var(--muted); }
  .filter-bar input[type="date"] { padding: 4px 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 0.85rem; }
  .filter-bar input[type="text"] { padding: 4px 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 0.85rem; flex: 1; min-width: 150px; }

  button, .btn { padding: 6px 14px; border: none; border-radius: 4px; background: var(--accent2); color: #fff; cursor: pointer; font-size: 0.85rem; }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-sm { padding: 3px 8px; font-size: 0.78rem; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }

  .settings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
  .settings-grid label { font-size: 0.8rem; color: var(--muted); display: block; }
  .settings-grid input, .settings-grid select, .settings-grid textarea { width: 100%; padding: 5px 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 0.85rem; margin-top: 2px; }
  .settings-grid textarea { height: 60px; resize: vertical; font-family: monospace; }
  .settings-grid .full-width { grid-column: 1 / -1; }

  #progress-log { font-size: 0.8rem; color: var(--muted); max-height: 300px; overflow-y: auto; margin-top: 8px; border-top: 1px solid var(--border); padding-top: 6px; }
  #progress-log p { margin: 2px 0; }

  .listings-container { padding: 0 16px 30px; }
  .listing-count { font-size: 0.85rem; color: var(--muted); margin-bottom: 8px; }

  .listing-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; overflow: hidden; }
  .listing-header { padding: 10px 14px; cursor: pointer; display: grid; grid-template-columns: 1fr auto auto auto; gap: 10px; align-items: center; }
  .listing-header:hover { background: rgba(255,255,255,0.03); }
  .listing-title { font-weight: 600; font-size: 0.95rem; }
  .listing-meta { font-size: 0.8rem; color: var(--muted); }
  .listing-badges { display: flex; gap: 6px; }
  .badge { font-size: 0.75rem; padding: 2px 8px; border-radius: 10px; background: var(--border); }
  .badge-img { background: #1a3a5c; color: var(--accent); }

  .listing-body { display: none; padding: 0 14px 14px; border-top: 1px solid var(--border); }
  .listing-body.open { display: block; }
  .listing-address { font-size: 0.85rem; margin-bottom: 8px; }
  .listing-address a { color: var(--accent); text-decoration: none; }
  .listing-actions { margin-bottom: 10px; display: flex; gap: 6px; }

  .image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
  .image-card { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
  .image-card img { width: 100%; aspect-ratio: 4/3; object-fit: cover; cursor: pointer; display: block; }
  .image-card .analysis { padding: 6px 8px; font-size: 0.78rem; color: var(--muted); max-height: 80px; overflow-y: auto; white-space: pre-wrap; }
  .image-card .pending { padding: 6px 8px; font-size: 0.78rem; color: var(--accent); font-style: italic; }
  .image-card.match { border: 2px solid var(--accent); box-shadow: 0 0 8px rgba(108,155,255,0.3); }
  mark.highlight { background: #b8860b; color: #fff; border-radius: 2px; padding: 0 2px; }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal-content { max-width: 90vw; max-height: 90vh; position: relative; display: flex; flex-direction: column; align-items: center; overflow: hidden; }
  .modal-content img { max-width: 90vw; max-height: 70vh; object-fit: contain; border-radius: 4px 4px 0 0; }
  .modal-close { position: absolute; top: -30px; right: 0; background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; z-index: 1; }
  .modal-analysis { width: 100%; background: rgba(0,0,0,0.8); padding: 10px 14px; font-size: 0.85rem; color: var(--text); max-height: 20vh; overflow-y: auto; white-space: pre-wrap; border-radius: 0 0 4px 4px; line-height: 1.5; }
</style>
</head>
<body>

<header>
  <h1>Estate Sale Scanner</h1>
  <div class="scan-indicator" id="scanIndicator">
    <span class="dot" id="scanDot"></span>
    <span id="scanText">Idle</span>
  </div>
  <div class="header-actions">
    <button id="scanBtn" onclick="triggerScan()">Scan Now</button>
  </div>
</header>

<!-- Zip Codes -->
<div class="panel">
  <h2>Zip Codes</h2>
  <table class="zip-table" id="zipTable">
    <thead><tr><th>Zip Code</th><th>Distance</th><th></th></tr></thead>
    <tbody id="zipRows"></tbody>
  </table>
  <div class="zip-add" style="margin-top:8px;display:flex;gap:6px;align-items:center;">
    <input type="text" id="zipInput" placeholder="91748" maxlength="5" pattern="\d{5}" />
    <input type="range" id="distInput" min="1" max="200" value="10" oninput="document.getElementById('distLabel').textContent=this.value+' mi'" />
    <span id="distLabel" style="font-size:0.82rem;color:var(--muted);width:40px">10 mi</span>
    <button onclick="addZipcode()">Add</button>
  </div>
</div>

<!-- Settings (collapsible) -->
<div class="panel">
  <details>
    <summary>Settings</summary>
    <div class="settings-grid" style="margin-top:10px;" id="settingsForm">
      <div><label>Ollama URL</label><input id="s_ollama_url" /></div>
      <div><label>Model</label><input id="s_ollama_model" /></div>
      <div><label>API Type</label>
        <select id="s_api_type"><option value="native">Ollama Native</option><option value="openai">OpenAI Compatible</option></select>
      </div>
      <div><label>API Key</label><input id="s_api_key" type="password" /></div>
      <div><label>Image Domain Filter</label><input id="s_image_domain" /></div>
      <div><label>Max Images / Listing</label><input id="s_max_images" type="number" min="0" /></div>
      <div><label>Image Scale</label><input id="s_image_scale" type="number" step="0.1" min="0.1" max="1" /></div>
      <div><label>AI Concurrency</label><input id="s_ai_concurrency" type="number" min="1" max="10" /></div>
      <div><label>Scan Interval (hours)</label><input id="s_scan_interval_hours" type="number" min="0.5" step="0.5" /></div>
      <div class="full-width"><label>AI Prompt</label><textarea id="s_ai_prompt"></textarea></div>
    </div>
    <button style="margin-top:8px;" onclick="saveSettings()">Save Settings</button>
  </details>
</div>

<!-- Filter bar -->
<div class="filter-bar">
  <label>From:</label><input type="date" id="filterFrom" />
  <label>To:</label><input type="date" id="filterTo" />
  <button class="btn-outline btn-sm" onclick="resetDates()">Reset</button>
  <input type="text" id="filterText" placeholder="Search listings…" oninput="applyTextFilter()" />
</div>

<!-- Progress log -->
<div class="panel" id="progressPanel" style="display:none;">
  <h2>Scan Progress</h2>
  <div id="progress-log"></div>
</div>

<!-- Listings -->
<div class="listings-container">
  <div class="listing-count" id="listingCount"></div>
  <div id="listingsArea"></div>
</div>

<!-- Image modal -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <img id="modalImg" />
    <div class="modal-analysis" id="modalAnalysis"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
